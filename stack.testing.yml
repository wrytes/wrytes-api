services:
    postgres:
        image: postgres:16-alpine
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
            POSTGRES_DB: wrytes
        ports:
            - '5432:5432'
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U postgres']
            interval: 10s
            timeout: 5s
            retries: 5
        networks:
            - backend
        deploy:
            replicas: 1
            restart_policy:
                condition: on-failure
                delay: 5s

    redis:
        image: redis:7-alpine
        command: redis-server --requirepass ${REDIS_PASSWORD:-redis}
        ports:
            - '6379:6379'
        volumes:
            - redis_data:/data
        healthcheck:
            test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD:-redis}', 'ping']
            interval: 10s
            timeout: 3s
            retries: 5
        networks:
            - backend
        deploy:
            replicas: 1
            restart_policy:
                condition: on-failure
                delay: 5s

volumes:
    postgres_data:
    redis_data:

networks:
    backend:
        driver: overlay
        attachable: true
