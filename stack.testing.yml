services:
    postgres:
        image: postgres:16-alpine
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
            POSTGRES_DB: wrytes
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U postgres']
            interval: 10s
            timeout: 5s
            retries: 5
        networks:
            - backend
        deploy:
            replicas: 1
            restart_policy:
                condition: on-failure
                delay: 5s

    redis:
        image: redis:7-alpine
        command: redis-server --requirepass ${REDIS_PASSWORD:-redis}
        volumes:
            - redis_data:/data
        healthcheck:
            test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD:-redis}', 'ping']
            interval: 10s
            timeout: 3s
            retries: 5
        networks:
            - backend
        deploy:
            replicas: 1
            restart_policy:
                condition: on-failure
                delay: 5s

    nestjs:
        image: node:22
        working_dir: /app
        volumes:
            - .:/app
            - nestjs_node_modules:/app/node_modules
        command: sh -c "yarn install && yarn run dev"
        ports:
            - '3030:3030'
        env_file:
            - .env
        depends_on:
            - postgres
            - redis
        networks:
            - backend
        deploy:
            replicas: 1
            restart_policy:
                condition: on-failure
                delay: 5s

volumes:
    postgres_data:
    redis_data:
    nestjs_node_modules:

networks:
    backend:
        driver: overlay
        attachable: true
